{% extends 'hub/base_hub.html' %}
{% block title %}Enrol Student — {{ biz.name }}{% endblock %}
{% block hub_content %}
<div class="mb-3"><a href="{% url 'sis:student_list' slug=biz.slug %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Students</a></div>
<div class="mb-4"><h4 class="fw-bold mb-0"><i class="bi bi-person-plus me-2 text-info"></i>Enrol New Student</h4></div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post" class="row g-3">
          {% csrf_token %}
          <div class="col-md-6"><label class="form-label">First Name <span class="text-danger">*</span></label><input type="text" name="first_name" class="form-control bg-dark text-white border-secondary" required></div>
          <div class="col-md-6"><label class="form-label">Last Name <span class="text-danger">*</span></label><input type="text" name="last_name" class="form-control bg-dark text-white border-secondary" required></div>
          <div class="col-md-6"><label class="form-label">Enrollment Number</label><input type="text" name="enrollment_number" class="form-control bg-dark text-white border-secondary font-monospace" placeholder="Auto-generated if blank"></div>
          <div class="col-md-3"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control bg-dark text-white border-secondary"></div>
          <div class="col-md-3"><label class="form-label">Gender</label>
            <select name="gender" class="form-select bg-dark text-white border-secondary">
              <option value="">— Select —</option>
              {% for code, label in genders %}<option value="{{ code }}">{{ label }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-4"><label class="form-label">Class / Grade</label><input type="text" name="class_group" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Grade 10, Year 3"></div>
          <div class="col-md-4"><label class="form-label">Section</label><input type="text" name="section" class="form-control bg-dark text-white border-secondary" placeholder="e.g. A, B"></div>
          <div class="col-md-4"><label class="form-label">Enrollment Date</label><input type="date" name="enrolled_date" class="form-control bg-dark text-white border-secondary"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control bg-dark text-white border-secondary"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control bg-dark text-white border-secondary"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" rows="2" class="form-control bg-dark text-white border-secondary"></textarea></div>
          <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" rows="2" class="form-control bg-dark text-white border-secondary"></textarea></div>
          <div class="col-12 d-flex gap-2 justify-content-end">
            <a href="{% url 'sis:student_list' slug=biz.slug %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-info text-dark"><i class="bi bi-person-check me-1"></i>Enrol Student</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
