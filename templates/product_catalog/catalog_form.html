{% extends 'hub/base_hub.html' %}
{% block title %}New Catalog — {{ biz.name }}{% endblock %}
{% block hub_content %}
<div class="mb-3"><a href="{% url 'product_catalog:home' slug=biz.slug %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Catalogs</a></div>
<h4 class="fw-bold mb-4"><i class="bi bi-journal-plus me-2 text-info"></i>New Product Catalog</h4>

<div class="card bg-dark border-secondary" style="max-width:560px">
  <div class="card-body">
    <form method="post" class="row g-3">
      {% csrf_token %}
      <div class="col-12">
        <label class="form-label small">Catalog Title <span class="text-danger">*</span></label>
        <input type="text" name="title" class="form-control bg-dark text-white border-secondary" placeholder="e.g. 2025 Spring Collection, Wholesale Price List" required>
      </div>
      <div class="col-12">
        <label class="form-label small">Description</label>
        <textarea name="description" rows="3" class="form-control bg-dark text-white border-secondary" placeholder="Brief description shown to buyers…"></textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-info text-dark">Create Catalog</button>
        <a href="{% url 'product_catalog:home' slug=biz.slug %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
