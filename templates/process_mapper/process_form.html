{% extends 'hub/base_hub.html' %}
{% block title %}New Process Map — {{ biz.name }}{% endblock %}
{% block hub_content %}
<div class="mb-3"><a href="{% url 'process_mapper:process_list' slug=biz.slug %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i>Process Maps</a></div>

<div class="mb-4">
  <h4 class="fw-bold mb-0"><i class="bi bi-diagram-3 me-2 text-success"></i>New Process Map</h4>
  <div class="small text-muted mt-1">Define a business process, then add steps and flows on the detail page.</div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post" class="row g-3">
          {% csrf_token %}
          <div class="col-12">
            <label class="form-label">Process Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Order Fulfilment Process" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Operations, Finance, HR">
          </div>
          <div class="col-md-6">
            <label class="form-label">Version</label>
            <input type="text" name="version" value="1.0" class="form-control bg-dark text-white border-secondary font-monospace">
          </div>
          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea name="description" rows="3" class="form-control bg-dark text-white border-secondary" placeholder="Describe the purpose and scope of this process…"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">Owner</label>
            <select name="owner_id" class="form-select bg-dark text-white border-secondary">
              <option value="">— unassigned —</option>
              {% for emp in employees %}<option value="{{ emp.pk }}">{{ emp.user.get_full_name }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select name="status" class="form-select bg-dark text-white border-secondary">
              <option value="draft">Draft</option>
              <option value="review">In Review</option>
              <option value="approved">Approved</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Tags</label>
            <input type="text" name="tags" class="form-control bg-dark text-white border-secondary" placeholder="e.g. customer-facing, automated, manual">
          </div>
          <div class="col-12 d-flex gap-2 justify-content-end">
            <a href="{% url 'process_mapper:process_list' slug=biz.slug %}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Create Process</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
