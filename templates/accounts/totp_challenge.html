{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card bg-surface border border-white-10 rounded-4 p-5 shadow-lg" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-cyan display-4 mb-3"></i>
            <h2 class="text-white fw-bold mb-2">Security Check</h2>
            <p class="text-white-50 small">Enter the 6-digit code from your authenticator app to continue.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show border-0" role="alert" style="background: rgba(255,59,48,0.1); color: #ff3b30;">
                    {{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <input type="text" name="totp_code" class="form-control form-control-lg bg-dark border-white-10 text-white text-center fw-bold tracking-widest py-3" placeholder="------" required autocomplete="off" autofocus maxlength="6" style="letter-spacing: 0.5em; font-size: 1.5rem;">
            </div>
            <button type="submit" class="btn btn-premium w-100 py-3 fw-bold fs-6">Verify</button>
            <div class="text-center mt-4">
                <a href="{% url 'accounts:login' %}" class="text-white-50 text-decoration-none small hover-text-white transition-all">Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
