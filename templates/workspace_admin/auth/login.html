<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Log In | BengalBound</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
    <!-- Background Glow -->
    <div class="position-absolute top-50 start-50 translate-middle w-100 h-100 bg-primary-gradient opacity-25" style="filter: blur(150px); z-index: -1;"></div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-5 border border-primary border-opacity-25 shadow-glow">
                    <div class="text-center mb-4">
                        <a href="http://localhost:1234/" class="text-decoration-none text-white fs-3 fw-bold font-outfit mb-2 d-block">
                            Workspace<span class="text-primary-gradient">Admin</span>
                        </a>
                        <p class="text-info small fw-medium text-uppercase tracking-wider">Internal Access Only</p>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger bg-danger bg-opacity-25 text-danger border-0 small">
                            Invalid credentials or unauthorized access.
                        </div>
                    {% endif %}

                    <form method="post" action="/accounts/login/" class="needs-validation" novalidate>
                        {% csrf_token %}
                        {% if request.GET.next %}
                            <input type="hidden" name="next" value="{{ request.GET.next }}">
                        {% endif %}
                        <div class="mb-4">
                            <label for="id_username" class="form-label text-white-50 small fw-medium">Admin Email</label>
                            <input type="email" name="username" class="form-control bg-dark text-white border-secondary shadow-none" id="id_username" placeholder="admin@bengalbound.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label text-white-50 small fw-medium">Password</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary shadow-none" id="id_password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary-gradient w-100 rounded-pill py-2 fw-semibold shadow-glow">Access Portal</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
