{% extends 'hub/base_hub.html' %}
{% block title %}New Job Card — {{ biz.name }}{% endblock %}

{% block hub_content %}
<div class="mb-4">
  <a href="{% url 'workshop:job_list' slug=biz.slug %}" class="text-muted text-decoration-none small">
    <i class="bi bi-arrow-left me-1"></i>Job Cards
  </a>
  <h4 class="fw-bold mt-1"><i class="bi bi-plus-circle me-2 text-warning"></i>New Job Card</h4>
</div>

<form method="post">
  {% csrf_token %}
  <div class="row g-4">

    <!-- Customer Details -->
    <div class="col-lg-6">
      <div class="card bg-dark border-secondary">
        <div class="card-header"><i class="bi bi-person me-1"></i>Customer Details</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label small">Customer Name <span class="text-danger">*</span></label>
            <input type="text" name="customer_name" class="form-control bg-dark text-white border-secondary" required>
          </div>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label small">Phone</label>
              <input type="text" name="customer_phone" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-6">
              <label class="form-label small">Email</label>
              <input type="email" name="customer_email" class="form-control bg-dark text-white border-secondary">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vehicle Details -->
    <div class="col-lg-6">
      <div class="card bg-dark border-secondary">
        <div class="card-header"><i class="bi bi-car-front me-1"></i>Vehicle Details</div>
        <div class="card-body">
          <div class="row g-2 mb-2">
            <div class="col-5">
              <label class="form-label small">Make <span class="text-danger">*</span></label>
              <input type="text" name="vehicle_make" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="col-5">
              <label class="form-label small">Model</label>
              <input type="text" name="vehicle_model" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-2">
              <label class="form-label small">Year</label>
              <input type="number" name="vehicle_year" class="form-control bg-dark text-white border-secondary" min="1900" max="2100">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-4">
              <label class="form-label small">Reg / Plate</label>
              <input type="text" name="vehicle_reg" class="form-control bg-dark text-white border-secondary font-monospace" style="text-transform:uppercase">
            </div>
            <div class="col-4">
              <label class="form-label small">Colour</label>
              <input type="text" name="colour" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-4">
              <label class="form-label small">Fuel Level</label>
              <select name="fuel_level" class="form-select bg-dark text-white border-secondary">
                <option value="">—</option>
                <option value="E">Empty</option>
                <option value="1/4">1/4</option>
                <option value="1/2" selected>1/2</option>
                <option value="3/4">3/4</option>
                <option value="F">Full</option>
              </select>
            </div>
          </div>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label small">VIN</label>
              <input type="text" name="vin" class="form-control bg-dark text-white border-secondary font-monospace">
            </div>
            <div class="col-6">
              <label class="form-label small">Mileage In</label>
              <input type="number" name="mileage_in" class="form-control bg-dark text-white border-secondary">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Job Details -->
    <div class="col-lg-6">
      <div class="card bg-dark border-secondary">
        <div class="card-header"><i class="bi bi-wrench me-1"></i>Job Details</div>
        <div class="card-body">
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small">Service Type</label>
              <select name="service_type" class="form-select bg-dark text-white border-secondary">
                {% for code, label in service_types %}
                <option value="{{ code }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small">Priority</label>
              <select name="priority" class="form-select bg-dark text-white border-secondary">
                {% for code, label in priorities %}
                <option value="{{ code }}" {% if code == 'normal' %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small">Assign Mechanic</label>
              <select name="assigned_to_id" class="form-select bg-dark text-white border-secondary">
                <option value="">Unassigned</option>
                {% for emp in employees %}
                <option value="{{ emp.pk }}">{{ emp.user.get_full_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label small">Bay</label>
              <select name="bay_id" class="form-select bg-dark text-white border-secondary">
                <option value="">No Bay</option>
                {% for bay in bays %}
                <option value="{{ bay.pk }}">{{ bay.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small">Estimated Completion</label>
            <input type="datetime-local" name="estimated_completion" class="form-control bg-dark text-white border-secondary">
          </div>
        </div>
      </div>
    </div>

    <!-- Complaint -->
    <div class="col-lg-6">
      <div class="card bg-dark border-secondary h-100">
        <div class="card-header"><i class="bi bi-chat-left-text me-1"></i>Customer Complaint / Notes</div>
        <div class="card-body">
          <textarea name="customer_complaint" rows="8" class="form-control bg-dark text-white border-secondary h-75"
            placeholder="Describe the customer's issue or request…"></textarea>
        </div>
      </div>
    </div>

    <div class="col-12 text-end">
      <a href="{% url 'workshop:job_list' slug=biz.slug %}" class="btn btn-outline-secondary me-2">Cancel</a>
      <button type="submit" class="btn btn-warning px-4">
        <i class="bi bi-check-lg me-1"></i>Create Job Card
      </button>
    </div>
  </div>
</form>
{% endblock %}
