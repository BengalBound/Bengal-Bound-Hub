<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You — {{ form.title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>body { background-color: #0d1117; }</style>
</head>
<body class="py-5">
  <div class="container">
    <div class="text-center" style="max-width:520px;margin:0 auto;margin-top:80px">
      <div class="display-1 text-success mb-3"><i class="bi bi-check-circle-fill"></i></div>
      <h3 class="fw-bold text-white mb-2">Thank you!</h3>
      <p class="text-muted mb-4">Your response to <strong class="text-white">{{ form.title }}</strong> has been recorded.</p>
      <a href="{% url 'data_collection:public_form' slug=biz.slug form_id=form.pk %}" class="btn btn-outline-secondary btn-sm">Submit another response</a>
      <div class="text-muted mt-5 small">Powered by BengalBound</div>
    </div>
  </div>
</body>
</html>
