{% extends 'base.html' %}
{% load i18n %}

{% block title %}Sign Out | BengalBound{% endblock %}

{% block content %}
<section class="min-vh-100 d-flex align-items-center position-relative overflow-hidden py-5">
    <!-- Gradient background glow -->
    <div class="position-absolute" style="top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 50%, rgba(239,68,68,0.12) 0%, transparent 60%); z-index:0; pointer-events:none;"></div>

    <div class="container" style="position:relative;z-index:1;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4 text-center">

                <!-- Logo/Brand -->
                <div class="mb-4 mt-5">
                    <a href="/" class="text-decoration-none">
                        <span style="font-family:'Outfit',sans-serif;font-weight:800;font-size:1.6rem;background:linear-gradient(135deg,#c084fc,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">BengalBound</span>
                    </a>
                </div>

                <!-- Glass Card -->
                <div class="glass-card p-4 p-lg-5 text-center" style="background:rgba(10, 10, 15, 0.6); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border:1px solid rgba(239,68,68,0.2); border-radius:1.5rem; box-shadow:0 15px 35px rgba(0,0,0,0.5), 0 0 30px rgba(239, 68, 68, 0.15);">
                    
                    <!-- Icon -->
                    <div class="d-inline-flex align-items-center justify-content-center mb-4 rounded-circle position-relative" 
                         style="width: 80px; height: 80px; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2);">
                        <i class="bi bi-box-arrow-right text-danger fs-1"></i>
                    </div>

                    <h1 class="fw-bold font-outfit text-white mb-2" style="font-size:1.5rem;">
                        {% trans "Sign Out" %}
                    </h1>
                    
                    <p class="text-white-50 small mb-4">
                        {% trans "Are you sure you want to sign out?" %}
                    </p>

                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                        {% endif %}
                        <button type="submit" class="btn btn-danger w-100 rounded-pill py-3 fw-semibold mb-3 bg-gradient" style="box-shadow: 0 0 15px rgba(239,68,68,0.4);">
                            {% trans "Yes, Sign Out" %}
                        </button>
                    </form>
                    
                    <a href="javascript:history.back()" class="btn btn-outline-secondary w-100 rounded-pill py-2.5 text-white-50 small">
                        {% trans "Cancel" %}
                    </a>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
