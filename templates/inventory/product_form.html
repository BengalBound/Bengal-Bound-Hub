{% extends 'hub/base_hub.html' %}
{% block title %}{% if product %}Edit Product{% else %}Add Product{% endif %} — {{ biz.name }}{% endblock %}
{% block page_title %}<i class="bi bi-box-seam me-2" style="color:var(--hub-accent);"></i>{% if product %}Edit Product{% else %}Add Product{% endif %}{% endblock %}
{% block content %}
<div class="glass-panel p-4" style="max-width:700px;">
  <form method="post">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Product Name</label><input name="name" value="{{ product.name|default:'' }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">SKU</label><input name="sku" value="{{ product.sku|default:'' }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Category</label><input name="category" value="{{ product.category|default:'' }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Unit</label><input name="unit" value="{{ product.unit|default:'pcs' }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"></div>
      <div class="col-md-4"><label class="form-label" style="color:var(--hub-muted);">Opening Stock</label><input type="number" name="stock" value="{{ product.stock|default:0 }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-md-4"><label class="form-label" style="color:var(--hub-muted);">Reorder Point</label><input type="number" name="reorder_point" value="{{ product.reorder_point|default:10 }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"></div>
      <div class="col-md-4"><label class="form-label" style="color:var(--hub-muted);">Unit Cost</label><input type="number" step="0.01" name="unit_cost" value="{{ product.unit_cost|default:'' }}" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"></div>
      <div class="col-12"><label class="form-label" style="color:var(--hub-muted);">Description</label><textarea name="description" rows="3" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);">{{ product.description|default:'' }}</textarea></div>
    </div>
    <div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-hub-primary btn-sm">{% if product %}Update{% else %}Add{% endif %} Product</button><a href="{% url 'inventory:products' slug=biz.slug %}" class="btn btn-hub-outline btn-sm">Cancel</a></div>
  </form>
</div>
{% endblock %}
