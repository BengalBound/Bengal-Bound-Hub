{% extends 'hub/base_hub.html' %}
{% block title %}Submit Expense Claim — {{ biz.name }}{% endblock %}
{% block page_title %}<i class="bi bi-receipt me-2" style="color:var(--hub-accent);"></i>Submit Expense Claim{% endblock %}
{% block content %}
<div class="glass-panel p-4" style="max-width:600px;">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Date</label><input type="date" name="date" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Category</label><select name="category" class="form-select" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"><option value="travel">Travel</option><option value="meals">Meals</option><option value="accommodation">Accommodation</option><option value="supplies">Supplies</option><option value="other">Other</option></select></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Amount</label><input type="number" step="0.01" name="amount" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-md-6"><label class="form-label" style="color:var(--hub-muted);">Currency</label><input name="currency" value="USD" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></div>
      <div class="col-12"><label class="form-label" style="color:var(--hub-muted);">Description</label><textarea name="description" rows="4" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);" required></textarea></div>
      <div class="col-12"><label class="form-label" style="color:var(--hub-muted);">Receipt / Attachment</label><input type="file" name="receipt" class="form-control" style="background:#1e293b;border-color:var(--hub-border);color:var(--hub-text);"></div>
    </div>
    <div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-hub-primary btn-sm">Submit Claim</button><a href="{% url 'expense:claims' slug=biz.slug %}" class="btn btn-hub-outline btn-sm">Cancel</a></div>
  </form>
</div>
{% endblock %}
