databases: []
# ── Database ──────────────────────────────────────────────────────────────────
# We use Supabase (free forever) instead of Render's 90-day free PostgreSQL.
# Create a project at https://supabase.com, copy the connection string,
# and paste it into DATABASE_URL in Render → Environment Variables.

services:
  # ── Django web service ──────────────────────────────────────────────────────
  - type: web
    name: bengalbound-web
    env: python
    plan: free
    region: oregon

    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py migrate --noinput &&
      python manage.py seed_modules &&
      python manage.py seed_agents &&
      python manage.py collectstatic --noinput

    startCommand: >-
      gunicorn bengalbound_core.wsgi:application
      --workers 2
      --timeout 120
      --bind 0.0.0.0:$PORT

    healthCheckPath: /

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: bengalbound_core.settings.render

      # Generate a strong random SECRET_KEY once — Render stores it securely
      - key: SECRET_KEY
        generateValue: true

      # ── Set these manually in Render → Environment Variables ──────────────
      # DATABASE_URL  →  postgres://... connection string from Supabase
      # FIELD_ENCRYPTION_KEY  →  run: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # LITELLM_BASE_URL  →  your LiteLLM proxy URL
      # LITELLM_MASTER_KEY  →  your LiteLLM key
      #
      # Optional:
      # ALLOWED_HOSTS  →  bengalbound-web.onrender.com,yourdomain.com
      # EMAIL_HOST / EMAIL_HOST_USER / EMAIL_HOST_PASSWORD / EMAIL_PORT
      # REDIS_URL  →  from Upstash (https://upstash.com) if you want async tasks
