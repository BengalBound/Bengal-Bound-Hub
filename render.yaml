databases:
  - name: bengalbound-db
    databaseName: bengalbound
    user: bengalbound

services:
  - type: web
    name: bengalbound-web
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput"
    startCommand: "gunicorn bengalbound_core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bengalbound-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_ENV
        value: production
